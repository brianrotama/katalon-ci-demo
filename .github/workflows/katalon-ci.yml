name: Katalon CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      run_reason:
        description: 'Reason to run'
        required: false
        default: 'manual'

jobs:
  katalon-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Katalon
        run: |
          wget https://download.katalon.com/10.2.0/Katalon_Studio_Linux_64-10.2.0.tar.gz
          tar -xzf Katalon_Studio_Linux_64-10.2.0.tar.gz

      - name: Run Katalon Test Suite
        run: |
          ./Katalon_Studio_Linux_64-10.2.0/katalonc \
            -noSplash \
            -runMode=console \
            -projectPath="$(pwd)/Phase_1_Simple_Running.prj" \
            -testSuitePath="Test Suites/TS_ReuseLogin_ObjectRepository_DataDriven" \
            -browserType="Chrome (headless)"

      - name: Upload Katalon Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: katalon-reports
          path: Reports/

      - name: Publish JUnit Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/JUnit_Report.xml'
