name: Katalon CI (Free Docker)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  katalon-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Katalon Tests (Docker)
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            katalonstudio/katalon \
            katalonc.sh \
            -noSplash \
            -runMode=console \
            -projectPath=/project/Phase_1_Simple_Running.prj \
            -testSuitePath="Test Suites/TS_ReuseLogin_ObjectRepository_DataDriven" \
            -browserType="Chrome (headless)" \
            -retry=0 \
            -retryFailedTestCases=false \
            -reportFolder=Reports \
            -reportFileName=ci-report

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: katalon-reports
          path: Reports/
